<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Travolish – Discover unique stays and experiences around the world. Book stunning villas, cozy cabins, city apartments, and more." />
    <meta name="theme-color" content="#FF385C" />
    <title>Travolish – Unique Stays & Experiences</title>
    <!-- Anti-flash: apply saved theme before first paint to avoid white flash -->
    <script>
      (function () {
        var s = localStorage.getItem('travolish-theme');
        var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
